<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생산 모니터링 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap');

  :root {
    /* Responsive base font-size — scales with viewport width
       1366px (small laptop) → ~13px (clamped min)
       1920px (FHD)          → ~16.3px
       2560px (QHD)          → 18px (clamped max)
       3840px (4K)           → 18px (clamped max) */
    font-size: clamp(13px, 0.85vw, 18px);
    --bg: #0b1120;
    --bg2: #0d1a2e;
    --panel: rgba(255,255,255,0.04);
    --panel-border: rgba(255,255,255,0.08);
    --panel-hover-border: rgba(26,223,139,0.25);
    --accent: #1adf8b;
    --accent-glow: rgba(26,223,139,0.55);
    --warn: #f7c948;
    --text-pri: #f0f4ff;
    --text-sec: rgba(240,244,255,0.6);
    --text-dim: rgba(240,244,255,0.32);
    --c-asm: #5DCAA5;
    --c-glz: #9FE1CB;
    --c-pkg: #1D9E75;
    --c-ship: #4a9eff;
    --c-inst: #c084fc;
    --hdr-bg: #ffffff;
    --hdr-text: #1a1a1a;
    --hdr-text-sec: #4b5563;
    --hdr-border: rgba(0,0,0,0.08);
    --hdr-accent: #0F6E56;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--text-pri); }

  /* ── HEADER (WHITE) ───────────────────────────── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; height: 54px;
    background: var(--hdr-bg);
    border-bottom: 0.5px solid var(--hdr-border);
    padding: 0 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    z-index: 100;
  }
  .hdr-left, .hdr-right { display: flex; align-items: center; gap: 12px; }
  .hdr-right { justify-content: flex-end; }

  #projectTitle {
    font-size: 1.0625rem; font-weight: 700; color: var(--hdr-text);
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
    transition: background .15s; letter-spacing: -0.3px;
    outline: none;
  }
  #projectTitle:hover { background: rgba(0,0,0,0.04); }
  #projectTitle.editing { background: rgba(15,110,86,0.06); border-bottom: 2px solid var(--hdr-accent); }
  .edit-ico { font-size: 0.6875rem; color: #9ca3af; cursor: pointer; transition: color .15s; }
  .edit-ico:hover { color: var(--hdr-accent); }

  /* Center area = project title — purely a label, no click affordance */
  .hdr-center {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; min-width: 200px;
  }

  /* Logo lives in hdr-left now. Clickable ONLY in admin mode. */
  #logoCenter {
    display: flex; align-items: center;
    gap: 10px; padding: 4px 8px; border-radius: 6px;
    min-height: 42px;
    transition: background .15s;
  }
  #logoCenter.admin { cursor: pointer; }
  #logoCenter.admin:hover { background: rgba(0,0,0,0.04); }
  #logoCenter.admin:hover .logo-change { opacity: 1; }
  #logoImg { max-height: 42px; max-width: 220px; object-fit: contain; display: block; }
  #logoPlaceholder {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; font-size: 0.6875rem; color: var(--hdr-text-sec);
    border: 1px dashed rgba(0,0,0,0.18); border-radius: 6px;
  }
  .logo-change {
    font-size: 0.625rem; color: var(--hdr-accent);
    opacity: 0; transition: opacity .15s;
  }

  .ref-date-block {
    display: flex; flex-direction: column; align-items: flex-end;
    cursor: pointer; padding: 3px 8px; border-radius: 5px;
    transition: background .15s; border: 0.5px solid transparent;
  }
  .ref-date-block:hover { background: #f0fdf4; border-color: rgba(15,110,86,0.2); }
  .ref-date-lbl { font-size: 0.5625rem; color: var(--hdr-text-sec); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
  .ref-date-val { font-size: 0.8125rem; color: var(--hdr-text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .ref-date-val::after { content: ' ▾'; font-size: 0.5625rem; color: var(--hdr-accent); }

  .total-block {
    display: flex; flex-direction: row; align-items: center; gap: 12px;
    padding: 5px 14px;
    background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
    border: 0.5px solid rgba(15,110,86,0.22);
    border-radius: 8px;
    height: 38px;
  }
  .total-lbl { font-size: 0.6875rem; color: var(--hdr-accent); text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; white-space: nowrap; }
  .total-val { font-size: 1.625rem; font-weight: 700; color: var(--hdr-text); font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; line-height: 1; }

  #liveClock { font-size: 0.6875rem; color: var(--hdr-text-sec); font-variant-numeric: tabular-nums; font-weight: 500; }

  .hdr-btn {
    background: #f9fafb; border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 6px; padding: 6px 11px; cursor: pointer;
    font-size: 0.6875rem; color: #4b5563; transition: all .15s;
    white-space: nowrap; font-weight: 500; font-family: inherit;
  }
  .hdr-btn:hover { border-color: var(--hdr-accent); color: var(--hdr-accent); background: #f0fdf4; }
  .hdr-btn.upload { border-color: var(--hdr-accent); color: var(--hdr-accent); background: #f0fdf4; }
  .hdr-btn.upload:hover { background: #dcfce7; }

  /* ── BOARD (FREE LAYOUT) ─────────────────────── */
  #board {
    position: absolute; left: 0; right: 0; top: 54px; bottom: 0;
    overflow: hidden;
  }

  .panel {
    position: absolute;
    background: var(--panel);
    border: 0.5px solid var(--panel-border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color .15s, box-shadow .15s;
  }
  .panel:hover { border-color: var(--panel-hover-border); }
  .panel.dragging {
    opacity: 0.85;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 2px var(--accent);
    z-index: 999;
    transition: none;
  }
  .panel.swap-target {
    box-shadow: 0 0 0 2px var(--accent), 0 0 24px var(--accent-glow);
    background: rgba(26,223,139,0.06);
  }
  .panel.resizing {
    z-index: 999;
    box-shadow: 0 0 0 1px var(--accent), 0 0 16px var(--accent-glow);
    transition: none;
  }

  .panel-header {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px 6px;
    border-bottom: 0.5px solid var(--panel-border);
    cursor: move;
    user-select: none;
  }
  .panel-title {
    font-size: 0.6875rem; font-weight: 500; color: var(--text-sec);
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
    padding: 1px 3px; border-radius: 3px;
  }
  .panel-title::before {
    content: ''; width: 3px; height: 11px;
    background: var(--accent); border-radius: 2px;
  }
  .panel-title.editing {
    background: rgba(26,223,139,0.08);
    outline: 1px solid var(--accent);
    color: var(--text-pri);
    cursor: text;
  }
  .panel-actions { display: flex; gap: 4px; }
  .panel-body {
    flex: 1 1 auto; overflow: hidden;
    padding: 8px 12px 10px;
    display: flex; flex-direction: column;
    min-height: 0;
  }

  /* ── RESIZE HANDLES (8 directions) ──────────── */
  .rs-handle {
    position: absolute;
    z-index: 5;
    background: transparent;
    transition: background .12s, box-shadow .12s;
  }
  .rs-n  { top: -3px; left: 14px; right: 14px; height: 6px; cursor: n-resize; }
  .rs-s  { bottom: -3px; left: 14px; right: 14px; height: 6px; cursor: s-resize; }
  .rs-e  { right: -3px; top: 14px; bottom: 14px; width: 6px; cursor: e-resize; }
  .rs-w  { left: -3px; top: 14px; bottom: 14px; width: 6px; cursor: w-resize; }
  .rs-ne { top: -4px; right: -4px; width: 14px; height: 14px; cursor: ne-resize; }
  .rs-nw { top: -4px; left: -4px; width: 14px; height: 14px; cursor: nw-resize; }
  .rs-se { bottom: -4px; right: -4px; width: 14px; height: 14px; cursor: se-resize; }
  .rs-sw { bottom: -4px; left: -4px; width: 14px; height: 14px; cursor: sw-resize; }

  .rs-handle:hover, .rs-handle.active {
    background: var(--accent-glow);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  body.is-resizing, body.is-dragging { user-select: none; }
  body.is-resizing *, body.is-dragging * { user-select: none !important; }

  /* ── PANEL CONTENT STYLES ────────────────────── */

  /* Progress + Status combined */
  .prog-grid { display: grid; grid-template-columns: 1fr; gap: 6px; flex: 1; min-height: 0; overflow: hidden; }
  .prog-item { display: flex; flex-direction: column; gap: 3px; }
  .prog-row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 4px; }
  .prog-name { font-size: 0.6875rem; color: var(--text-sec); }
  .prog-num { display: flex; gap: 6px; align-items: baseline; }
  .prog-cnt { font-size: 0.8125rem; font-weight: 600; color: var(--text-pri); font-variant-numeric: tabular-nums; }
  .prog-pct { font-size: 0.625rem; color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .prog-track { height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); }

  /* Status summary cards */
  .ss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; flex: 1; min-height: 0; }
  .ss-card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.06);
    border-radius: 6px;
    padding: 8px 10px;
    display: flex; flex-direction: column; justify-content: center;
    transition: background .15s, border-color .15s;
  }
  .ss-card:hover { background: rgba(255,255,255,0.05); }
  .ss-card .ss-name { font-size: 0.625rem; color: var(--text-sec); display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
  .ss-card .ss-dot { width: 7px; height: 7px; border-radius: 50%; }
  .ss-card .ss-val { font-size: 1.25rem; font-weight: 700; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; color: var(--text-pri); line-height: 1; }
  .ss-card .ss-pct { font-size: 0.625rem; color: var(--text-dim); margin-top: 2px; font-variant-numeric: tabular-nums; }

  /* Today shipment */
  .today-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; transition: background .15s; border-radius: 8px; }
  .today-wrap:hover { background: rgba(26,223,139,0.04); }
  .today-date { font-size: 0.875rem; font-weight: 500; color: var(--text-sec); }
  .today-date::after { content: ' ▾'; font-size: 0.625rem; color: var(--accent); }
  .today-unit { font-size: 0.625rem; color: var(--text-dim); }
  .today-val { font-size: 4rem; font-weight: 700; font-family: 'Bebas Neue', sans-serif; color: var(--accent); line-height: 1; text-shadow: 0 0 24px rgba(26,223,139,0.35); }

  /* Chart wrapper */
  .chart-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 6px; font-size: 0.625rem; color: var(--text-sec); flex: 0 0 auto; }
  .leg-item { display: flex; align-items: center; gap: 4px; }
  .leg-swatch { width: 9px; height: 9px; border-radius: 2px; }
  .chart-wrap { flex: 1 1 auto; position: relative; min-height: 0; overflow: hidden; }
  .chart-wrap.scroll-x { overflow-x: auto; overflow-y: hidden; }
  .chart-inner { position: relative; height: 100%; }

  /* Notes */
  .notes-list { flex: 1; overflow-y: auto; }
  .note-item { font-size: 0.6875rem; line-height: 1.5; color: var(--text-sec); padding: 5px 0; border-bottom: 0.5px solid rgba(255,255,255,0.05); }
  .note-item::before { content: '▸ '; color: var(--warn); }

  /* Floor table */
  .floor-scroll { flex: 1; overflow: auto; }
  .floor-tbl { border-collapse: collapse; font-size: 0.625rem; white-space: nowrap; }
  .floor-tbl th { background: rgba(26,223,139,0.08); color: var(--accent); font-weight: 500; padding: 4px 10px; text-align: center; border: 0.5px solid rgba(255,255,255,0.06); position: sticky; top: 0; z-index: 2; min-width: 38px; }
  .floor-tbl td { padding: 4px 10px; text-align: center; border: 0.5px solid rgba(255,255,255,0.05); color: var(--text-dim); min-width: 38px; font-variant-numeric: tabular-nums; }
  .floor-tbl td.has-val { color: var(--text-pri); cursor: pointer; transition: background .12s; }
  .floor-tbl td.has-val:hover { background: rgba(26,223,139,0.1); color: var(--accent); }
  .floor-tbl td.row-lbl, .floor-tbl th.sticky-col { text-align: left; font-weight: 500; position: sticky; left: 0; z-index: 3; background: #0f1a2e; min-width: 78px; padding-left: 10px; }
  .floor-tbl td.color-pick { cursor: pointer; transition: background .15s; padding-right: 14px; }
  .floor-tbl td.color-pick:hover { background: rgba(255,255,255,0.04); }
  .floor-tbl td.color-pick .color-ico {
    margin-left: 6px; font-size: 0.5625rem; opacity: 0.5;
    transition: opacity .15s, transform .15s;
  }
  .floor-tbl td.color-pick:hover .color-ico { opacity: 1; transform: scale(1.3); }
  .floor-tbl tr.plan td { color: #ff6b6b; font-weight: 500; }
  .floor-tbl tr.plan td.has-val:hover { background: rgba(255,107,107,0.1); color: #ff6b6b; }
  .floor-tbl tr.plan td.row-lbl { background: #0f1a2e; }

  /* Custom scrollbars (green) */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); border-radius: 4px; }
  *::-webkit-scrollbar-thumb { background: rgba(26,223,139,0.4); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(26,223,139,0.6); }
  * { scrollbar-width: thin; scrollbar-color: rgba(26,223,139,0.4) rgba(255,255,255,0.04); }

  /* ── MODAL ────────────────────────────────── */
  .modal-bg {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal-card {
    background: #111c2e; border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 14px; max-width: 90vw; max-height: 88vh;
    display: flex; flex-direction: column; min-width: 480px;
  }
  .modal-hd {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 22px; border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .modal-hd h3 {
    font-size: 0.875rem; font-weight: 500; color: var(--accent);
    letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;
  }
  .modal-hd h3::before { content: '▎'; color: var(--accent); }
  .modal-close {
    background: none; border: 0.5px solid rgba(255,255,255,0.12);
    color: var(--text-sec); width: 28px; height: 28px; border-radius: 6px;
    cursor: pointer; font-size: 0.875rem; transition: all .15s;
  }
  .modal-close:hover { color: var(--accent); border-color: var(--accent); }
  .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; min-height: 100px; }

  .modal-table { width: 100%; border-collapse: collapse; font-size: 0.6875rem; }
  .modal-table th { background: rgba(26,223,139,0.08); color: var(--accent); font-weight: 500; padding: 6px 10px; text-align: left; border-bottom: 0.5px solid rgba(255,255,255,0.08); position: sticky; top: 0; }
  .modal-table td { padding: 5px 10px; color: var(--text-sec); border-bottom: 0.5px solid rgba(255,255,255,0.04); }
  .modal-table tr:hover td { background: rgba(255,255,255,0.03); color: var(--text-pri); }
  /* highlighted column = the stage the user clicked */
  .modal-table th.hl {
    color: var(--hl-c, var(--accent)) !important;
    background: var(--hl-bg, rgba(26,223,139,0.18)) !important;
    border-bottom: 2px solid var(--hl-c, var(--accent));
  }
  .modal-table th.hl::after { content: ' ◀'; font-size: 0.5625rem; opacity: 0.8; }
  .modal-table td.hl {
    color: var(--hl-c, var(--accent)) !important;
    background: var(--hl-bg-l, rgba(26,223,139,0.06)) !important;
    font-weight: 600;
    border-left: 1px solid var(--hl-c, var(--accent));
    border-right: 1px solid var(--hl-c, var(--accent));
  }
  .modal-table tr:hover td.hl { background: var(--hl-bg, rgba(26,223,139,0.12)) !important; }
  .modal-table tr:last-child td.hl { border-bottom: 1px solid var(--hl-c, var(--accent)); }
  .modal-empty { padding: 36px 0; text-align: center; color: var(--text-dim); font-size: 0.75rem; }

  /* Settings */
  .s-group { margin-bottom: 16px; }
  .s-group label { display: block; font-size: 0.625rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 500; }
  .s-group input[type=text], .s-group input[type=number], .s-group input[type=password], .s-group textarea {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.13); border-radius: 7px;
    padding: 8px 11px; color: var(--text-pri); font-size: 0.8125rem;
    font-family: inherit; outline: none; transition: border-color .15s;
  }
  .s-group input:focus, .s-group textarea:focus { border-color: var(--accent); }
  .s-row { display: flex; gap: 8px; align-items: center; }
  .s-row > input { flex: 1; }
  .s-row > span { color: var(--text-sec); font-size: 0.75rem; }
  .s-actions { display: flex; gap: 8px; margin-top: 18px; }
  /* 설정 모달 고정 하단 버튼 영역 */
  .modal-ft {
    display: flex; gap: 8px;
    padding: 14px 22px;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    background: #111c2e;
    border-radius: 0 0 14px 14px;
    flex-shrink: 0;
  }
  .btn-primary { flex: 1; padding: 9px; border-radius: 7px; cursor: pointer; font-size: 0.8125rem; font-weight: 500; border: none; background: var(--accent); color: #0b1120; transition: opacity .15s; font-family: inherit; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost { flex: 1; padding: 9px; border-radius: 7px; cursor: pointer; font-size: 0.8125rem; font-weight: 500; background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.13); color: var(--text-sec); font-family: inherit; }
  .btn-ghost:hover { color: var(--text-pri); }

  /* date picker hidden input */
  #refDateInput { position: absolute; opacity: 0; pointer-events: none; }

  /* hide native file pickers — accessed via clicking the label / logo area */
  #xlsxInput, #logoInput { position: absolute !important; width: 1px !important; height: 1px !important; opacity: 0 !important; pointer-events: none !important; overflow: hidden !important; clip: rect(0,0,0,0) !important; }

  /* ── SNAP GUIDELINES (shown only during drag/resize) ──── */
  .snap-guide {
    position: fixed; pointer-events: none; z-index: 998;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent-glow), 0 0 12px rgba(26,223,139,0.25);
    opacity: 0; transition: opacity .08s;
  }
  .snap-guide.show { opacity: 0.85; }

  /* ── UPLOAD DROPDOWN ────────────────────────── */
  .upload-dropdown {
    position: relative;
    display: inline-block;
  }
  .upload-dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 0;
    background-color: #111c2e;
    min-width: 170px;
    box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    z-index: 200;
  }
  .upload-dropdown-content label {
    color: var(--text-pri);
    padding: 8px 14px;
    text-decoration: none;
    display: block;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background-color .15s, color .15s;
    border-bottom: 0.5px solid rgba(255,255,255,0.05);
  }
  .upload-dropdown-content label:last-child {
    border-bottom: none;
  }
  .upload-dropdown-content label:hover {
    background-color: rgba(26,223,139,0.08);
    color: var(--accent);
  }
  .upload-dropdown:hover .upload-dropdown-content {
    display: block;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: #1a1a2e; border: 0.5px solid rgba(26,223,139,0.3);
    border-radius: 8px; padding: 9px 18px;
    font-size: 0.75rem; color: var(--text-pri);
    opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 9999; white-space: nowrap;
  }

<script>
/* ════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════ */
const state = {
  projectName: 'SK 영등포 양평동 프로젝트',
  orderNo: '',
  logoSrc: '',
  totalQty: 2025,
  floorStart: 3,
  floorEnd: 17,
  notes: ['예제) - 원자재 37층까지 발주 완료 (96%)', '28~37층 발주분 입고중 (0%)'],
  refDate: new Date(),
  rows: [],
  layout: {},
  stageColors: {
    '조립':    '#5DCAA5',
    '글레이징': '#9FE1CB',
    '포장':    '#1D9E75',
    '출하':    '#4a9eff',
    '설치':    '#c084fc'
  }
};
state.refDate.setHours(0,0,0,0);

const PANEL_DEFS = [
  { id: 'p1', type: 'progress',      title: '공정율 · 생산 설치 현황' },
  { id: 'p2', type: 'dailyChart',    title: '7일간 일자별 생산실적 (UNIT)' },
  { id: 'p3', type: 'todayShip',     title: '일일 출하' },
  { id: 'p4', type: 'statusSummary', title: '생산 상태별 누적' },
  { id: 'p5', type: 'weeklyChart',   title: '4주간 생산실적 (UNIT)' },
  { id: 'p6', type: 'notes',         title: '특기사항' },
  { id: 'p7', type: 'floorTable',    title: '층별 생산현황' },
  { id: 'p8', type: 'processChart',  title: '생산공정 관리표' },
];

let charts = {};

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (el) {
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }
}

function getProjectFilename() {
  const params = new URLSearchParams(window.location.search);
  const project = params.get('project');
  if (project) {
    const safeProject = project.replace(/[^a-zA-Z0-9_-]/g, '');
    if (safeProject) {
      return `data_${safeProject}.json`;
    }
  }
  return 'data.json';
}

/* ════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════ */
const ORDER_NO_KEYS = ['수주번호', '수주 번호', 'order_no', 'orderNo', 'OrderNo'];
function getFilteredRows() {
  if (!state.orderNo) return state.rows;
  return state.rows.filter(r => {
    for (const key of ORDER_NO_KEYS) {
      if (r[key] !== undefined && r[key] !== null) {
        return String(r[key]).trim() === state.orderNo.trim();
      }
    }
    return false;
  });
}

function parseDate(v) {
  if (!v) return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  if (typeof v === 'number') {
    const d = new Date(Math.round((v - 25569) * 86400 * 1000));
    return isNaN(d) ? null : d;
  }
  const d = new Date(String(v).trim());
  return isNaN(d) ? null : d;
}
const toDS = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : null;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); r.setHours(0,0,0,0); return r; };
function startOfWeek(d) { const r = new Date(d); r.setHours(0,0,0,0); r.setDate(r.getDate() - ((r.getDay()+6)%7)); return r; }
function fmtDate(d) {
  if (!d) return '—';
  const days = ['일','월','화','수','목','금','토'];
  return `${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}(${days[d.getDay()]})`;
}
function normFloor(v) {
  if (v === null || v === undefined) return null;
  const m = String(v).match(/(\d+)/);
  return m ? parseInt(m[1]) : null;
}
const GLZ_KEYS = ['글래이징완료시간','글레이징완료시간','글레이징_완료시간'];
function getGlzVal(r) { for (const k of GLZ_KEYS) if (r[k] !== undefined && r[k] !== null) return r[k]; return null; }
function shipDateOf(r) { return parseDate(r['출하일'] || r['출하완료시간']); }
function isCompletedBy(stage, st, dRow, refDate) {
  // returns true if row reached this stage by refDate (inclusive)
  const orderMap = { '조립완료':1, '글래이징완료':2, '글레이징완료':2, '포장완료':3, '출하완료':4, '설치완료':5 };
  const stageOrder = { '조립':1, '글레이징':2, '포장':3, '출하':4, '설치':5 }[stage];
  const rowOrder = orderMap[(st||'').trim()] || 0;
  if (rowOrder < stageOrder) return false;
  // also check the date when this stage completed (if available)
  const colByStage = {
    '조립': parseDate(dRow['조립완료시간']),
    '글레이징': parseDate(getGlzVal(dRow)),
    '포장': parseDate(dRow['포장완료시간']),
    '출하': shipDateOf(dRow),
    '설치': parseDate(dRow['설치완료시간']),
  };
  const colD = colByStage[stage];
  if (colD) return colD <= refDate;
  // if the date for this stage is missing but row's overall status is past this stage, count it
  return true;
}

function computeStageCounts(rows, refDate) {
  const out = { 조립:0, 글레이징:0, 포장:0, 출하:0, 설치:0 };
  rows.forEach(r => {
    const st = (r['상태']||'').trim();
    Object.keys(out).forEach(stage => {
      if (isCompletedBy(stage, st, r, refDate)) out[stage]++;
    });
  });
  return out;
}

/* ════════════════════════════════════════════
   STAGE COLOR CUSTOMIZATION
   ════════════════════════════════════════════ */
function applyStageColors() {
  const r = document.documentElement.style;
  r.setProperty('--c-asm',  state.stageColors['조립']);
  r.setProperty('--c-glz',  state.stageColors['글레이징']);
  r.setProperty('--c-pkg',  state.stageColors['포장']);
  r.setProperty('--c-ship', state.stageColors['출하']);
  r.setProperty('--c-inst', state.stageColors['설치']);
}

function openColorPicker(stage) {
  let inp = document.getElementById('_colorPickerInput');
  if (!inp) {
    inp = document.createElement('input');
    inp.type = 'color';
    inp.id = '_colorPickerInput';
    inp.style.cssText = 'position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(inp);
  }
  inp.value = state.stageColors[stage] || '#5DCAA5';
  inp.onchange = function(e) {
    state.stageColors[stage] = e.target.value;
    applyStageColors();
    renderAll();
  };
  inp.click();
  if (typeof inp.showPicker === 'function') {
    try { inp.showPicker(); } catch(e) {}
  }
}
window.openColorPicker = openColorPicker;

/* ════════════════════════════════════════════
   SERVER DATA SYNC (Synology NAS — same-origin fetch)
   ════════════════════════════════════════════
   - Load: every visitor's browser fetches ./data.json at startup
           → applies project name, total qty, floors, notes, colors,
             panel titles, layout, rows. Falls back to demo if missing.
   - Save: admin clicks 💾 서버 저장 → downloads data.json with
           current state. Admin uploads that file to NAS (manual).
           Button only appears when URL has ?admin=1.
   ════════════════════════════════════════════ */

function ensurePercentageLayout() {
  let isPixel = false;
  let maxX = 0;
  let maxY = 0;
  
  Object.keys(state.layout).forEach(id => {
    const L = state.layout[id];
    if (L && L.w > 2) {
      isPixel = true;
      maxX = Math.max(maxX, L.x + L.w);
      maxY = Math.max(maxY, L.y + L.h);
    }
  });

  if (isPixel) {
    const originalW = maxX > 0 ? (maxX + 6) : 1920;
    const originalH = maxY > 0 ? (maxY + 6) : 1026;
    
    console.log('[layout] Converting pixel layout to percentages. Estimated original size:', originalW, 'x', originalH);

    Object.keys(state.layout).forEach(id => {
      const L = state.layout[id];
      if (L) {
        L.x = L.x / originalW;
        L.y = L.y / originalH;
        L.w = L.w / originalW;
        L.h = L.h / originalH;
      }
    });
  }
}

// 전역 저장 이력 상태 변수 추가
state.loadedFilename = '';

async function loadServerData(selectedMode = null) {
  const params = new URLSearchParams(window.location.search);
  const project = params.get('project') || '';
  const safeProject = project.replace(/[^a-zA-Z0-9_-]/g, '');

  let mode = selectedMode;

  // 최초 로드 시(selectedMode가 없을 때) '현장' 데이터와 '종합' 데이터의 이력을 파악하여 불러옵니다.
  if (!mode) {
    let projectData = null;
    let commonData = null;
    
    const projectFile = safeProject ? `data_${safeProject}.json` : 'data.json';
    const commonFile = 'data_common.json';

    // 1. 현장 파일 로드 시도
    try {
      const res = await fetch('./' + projectFile, { cache: 'no-cache' });
      if (res.ok) {
        projectData = await res.json();
      }
    } catch (e) {
      console.warn(`[server] Initial check - Project file load failed:`, e);
    }

    // 2. 종합 파일 로드 시도
    try {
      const res = await fetch('./' + commonFile, { cache: 'no-cache' });
      if (res.ok) {
        commonData = await res.json();
      }
    } catch (e) {
      console.warn(`[server] Initial check - Common file load failed:`, e);
    }

    // 현장 파일 내부에 저장되어 있는 이력 모드(viewMode) 설정에 맞춰 로드 결정
    if (projectData) {
      const savedViewMode = projectData.viewMode || '현장';
      
      if (savedViewMode === '종합') {
        // 마지막 저장 상태가 '종합'이었던 경우 -> 현장 설정을 로드하고, rows는 종합 파일의 것으로 채웁니다.
        mode = '종합';
        applyLoadedData(projectData); // 현장 고유 설정 복원
        if (commonData && commonData.rows) {
          state.rows = commonData.rows; // rows만 공통 데이터로 적용
        }
        if (commonData && commonData.tempHumidRows) {
          state.tempHumidRows = commonData.tempHumidRows;
        }
      } else {
        // 마지막 저장 상태가 '현장'이었던 경우 -> 현장 파일의 모든 데이터(설정+rows) 적용
        mode = '현장';
        applyLoadedData(projectData);
      }
    } else if (commonData) {
      // 현장 파일이 아예 없고 종합 파일만 있는 경우
      mode = '종합';
      if (commonData.rows) {
        state.rows = commonData.rows;
      }
      if (commonData.tempHumidRows) {
        state.tempHumidRows = commonData.tempHumidRows;
      }
    } else {
      // 둘 다 없을 경우 fallback으로 data.json 시도
      try {
        const res = await fetch('./data.json', { cache: 'no-cache' });
        if (res.ok) {
          const d = await res.json();
          applyLoadedData(d);
          mode = '현장';
        }
      } catch (e) {
        console.warn(`[server] Initial check - data.json fallback failed:`, e);
      }
    }

    if (mode) {
      state.loadedFilename = mode;
      syncHistorySelectValue();
      if (mode === '종합' && project) {
        state.orderNo = project;
      }

      // 화면 로드 시 기준일을 오늘 날짜로 강제 설정
      state.refDate = new Date();
      state.refDate.setHours(0,0,0,0);

      console.log(`[server] Auto-loaded latest via viewMode: ${mode}`);
      return true;
    }
    return false;
  }

  // 수동 선택 변경 시 (기존 로직 유지)
  let targetFile = '';
  if (mode === '현장') {
    targetFile = safeProject ? `data_${safeProject}.json` : 'data.json';
  } else if (mode === '종합') {
    targetFile = 'data_common.json';
  }

  try {
    let res = await fetch('./' + targetFile, { cache: 'no-cache' });
    if (!res.ok) {
      if (mode === '현장') {
        console.warn(`[server] 현장 파일(${targetFile}) 로드 실패. 종합(data_common.json) 로드 시도.`);
        res = await fetch('./data_common.json', { cache: 'no-cache' });
        if (!res.ok) {
          console.warn(`[server] data_common.json 로드 실패. data.json 로드 시도.`);
          res = await fetch('./data.json', { cache: 'no-cache' });
        }
        if (res.ok) {
          mode = '종합';
        }
      } else if (mode === '종합') {
        console.warn(`[server] 종합 파일(${targetFile}) 로드 실패. data.json 로드 시도.`);
        res = await fetch('./data.json', { cache: 'no-cache' });
      }
    }

    if (res && res.ok) {
      const d = await res.json();
      if (mode === '종합') {
        // 종합 파일 로드 시에는 혹시 남아 있을 옛날 고유 설정들은 무시하고 오직 엑셀 데이터(rows)만 병합 적용합니다.
        if (d.rows) state.rows = d.rows;
        if (d.tempHumidRows) state.tempHumidRows = d.tempHumidRows;
      } else {
        applyLoadedData(d);
      }
      state.loadedFilename = mode;
      syncHistorySelectValue();

      if (mode === '종합' && project) {
        state.orderNo = project;
      }

      // 저장 이력 변경 시에도 기준일을 오늘 날짜로 강제 설정
      state.refDate = new Date();
      state.refDate.setHours(0,0,0,0);

      console.log(`[server] Loaded data from ${res.url} (Mode: ${mode})`);
      return true;
    }
    return false;
  } catch (e) {
    console.error(`[server] Error loading data for mode ${mode}:`, e);
    return false;
  }
}

// 로드한 데이터를 state에 매핑하는 보조 함수
function applyLoadedData(d) {
  if (d.projectName) state.projectName = d.projectName;
  if (d.orderNo !== undefined) state.orderNo = d.orderNo;
  if (d.logoSrc)     state.logoSrc = d.logoSrc;
  if (d.totalQty != null)   state.totalQty = d.totalQty;
  if (d.floorStart != null) state.floorStart = d.floorStart;
  if (d.floorEnd != null)   state.floorEnd = d.floorEnd;
  if (Array.isArray(d.notes))  state.notes = d.notes;
  if (d.stageColors)           Object.assign(state.stageColors, d.stageColors);
  if (Array.isArray(d.panelTitles)) {
    d.panelTitles.forEach(t => {
      const def = PANEL_DEFS.find(p => p.id === t.id);
      if (def && t.title) def.title = t.title;
    });
  }
  if (d.layout && Object.keys(d.layout).length) {
    state.layout = d.layout;
    ensurePercentageLayout();
  }
  if (Array.isArray(d.rows)) state.rows = d.rows;
  if (d.refDate) {
    const rd = new Date(d.refDate);
    if (!isNaN(rd)) state.refDate = rd;
  }
}

async function exportServerData() {
  const params = new URLSearchParams(window.location.search);
  const project = params.get('project') || '';
  const safeProject = project.replace(/[^a-zA-Z0-9_-]/g, '');

  // 대시보드 메인 화면 저장(레이아웃 등)은 공통 파일 오염 방지를 위해 항상 현장 전용 파일로 저장합니다.
  const targetProject = safeProject;

  const payload = {
    schema: 'production-dashboard.v1',
    savedAt: new Date().toISOString(),
    viewMode: state.loadedFilename || '현장', // 현재 보고 있는 '현장'/'종합' 상태 기록
    projectName: state.projectName,
    orderNo: state.orderNo,
    logoSrc: state.logoSrc,
    totalQty: state.totalQty,
    floorStart: state.floorStart,
    floorEnd: state.floorEnd,
    notes: state.notes,
    stageColors: state.stageColors,
    refDate: toDS(state.refDate),
    panelTitles: PANEL_DEFS.map(p => ({ id: p.id, title: p.title })),
    layout: state.layout,
    rows: state.rows,
    tempHumidRows: state.tempHumidRows,
  };
  
  const json = JSON.stringify(payload, null, 2);
  const pwd = localStorage.getItem('dashboard_password') || '1234';
  const btn = document.getElementById('serverSaveBtn');
  const origText = btn ? btn.innerHTML : '💾 서버 저장';

  if (btn) {
    btn.innerHTML = '⚡ 저장 중...';
    btn.disabled = true;
  }

  try {
    const res = await fetch('./save_data.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Dashboard-Password': pwd,
        'X-Dashboard-Project': targetProject
      },
      body: json
    });
    
    // Check if the response is JSON
    const contentType = res.headers.get("content-type");
    if (contentType && contentType.indexOf("application/json") !== -1) {
      const resData = await res.json();
      if (res.ok && resData.success) {
        const savedFile = resData.filename || '';
        if (savedFile) {
          state.loadedFilename = payload.viewMode; // 저장한 당시의 이력 모드('현장'/'종합')를 그대로 적용
          syncHistorySelectValue();
        }

        if (btn) {
          btn.innerHTML = '✓ 저장 완료';
          btn.style.background = '#dcfce7';
          btn.style.color = '#15803d';
          btn.style.borderColor = '#bbf7d0';
          setTimeout(() => {
            btn.innerHTML = origText;
            btn.style.background = '';
            btn.style.color = '';
            btn.style.borderColor = '';
            btn.disabled = false;
          }, 2000);
        }
        return;
      } else {
        throw new Error(resData.message || '서버 응답 오류');
      }
    } else {
      const text = await res.text();
      throw new Error('올바르지 않은 서버 응답 (PHP 모듈이 활성화되었는지 확인하세요)');
    }
  } catch (err) {
    console.error('API 저장 실패:', err);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = origText;
    }
    
    const fallbackFilename = `data_${safeProject || 'default'}_${toDS(new Date()).replace(/-/g, '')}_manual.json`;
    alert('서버 자동 저장에 실패했습니다. 사유: ' + err.message + `\n\n설정 유지를 위해 수동으로 ${fallbackFilename} 파일 다운로드를 실행합니다. 다운로드받은 파일을 NAS 서버의 대시보드 폴더에 덮어씌워 주세요.`);
    
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fallbackFilename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }
}
window.exportServerData = exportServerData;

function calcDefaultLayout() {
  const W = window.innerWidth || 1920;
  const H = window.innerHeight || 1080;
  const headerH = 54;             // matches #header height
  const topOffset = 4;            // small breathing room from board top (= just below header)
  const padding = 6;
  const gap = 6;
  const bodyW = W - padding * 2;
  const bodyH = H - headerH - topOffset - padding;  // actual usable height inside board

  const col1W = Math.max(220, Math.floor(bodyW * 0.18));
  const col3W = Math.max(180, Math.floor(bodyW * 0.16));
  const col2W = bodyW - col1W - col3W - gap * 2;

  // 3개 행 분할 (Progress/Daily/Today: 20%, Cumulative/Weekly/Notes: 20%, FloorTable/ProcessChart: 60%)
  const row1H = Math.floor(bodyH * 0.20);
  const row2H = Math.floor(bodyH * 0.20);
  const row3H = bodyH - row1H - row2H - gap * 2;

  const x1 = padding, x2 = x1 + col1W + gap, x3 = x2 + col2W + gap;
  const y1 = topOffset;
  const y2 = y1 + row1H + gap;
  const y3 = y2 + row2H + gap;

  const boardW = W;
  const boardH = H - headerH;

  return {
    p1: { x: x1 / boardW, y: y1 / boardH, w: col1W / boardW, h: row1H / boardH },
    p2: { x: x2 / boardW, y: y1 / boardH, w: col2W / boardW, h: row1H / boardH },
    p3: { x: x3 / boardW, y: y1 / boardH, w: col3W / boardW, h: row1H / boardH },
    p4: { x: x1 / boardW, y: y2 / boardH, w: col1W / boardW, h: row2H / boardH },
    p5: { x: x2 / boardW, y: y2 / boardH, w: col2W / boardW, h: row2H / boardH },
    p6: { x: x3 / boardW, y: y2 / boardH, w: col3W / boardW, h: row2H / boardH },
    p7: { x: x1 / boardW, y: y3 / boardH, w: (col1W + col2W + gap) / boardW, h: row3H / boardH },
    p8: { x: x3 / boardW, y: y3 / boardH, w: col3W / boardW, h: row3H / boardH }
  };
}

function applyLayout() {
  const boardW = window.innerWidth;
  const boardH = window.innerHeight - 54;

  PANEL_DEFS.forEach(d => {
    const p = document.getElementById(d.id);
    if (!p) return;
    const L = state.layout[d.id];
    if (!L) return;

    // Clamp to make sure everything stays inside the viewport
    let x = Math.max(0, Math.min(boardW - 140, L.x * boardW));
    let y = Math.max(0, Math.min(boardH - 90, L.y * boardH));
    let w = Math.max(140, Math.min(boardW - x, L.w * boardW));
    let h = Math.max(90, Math.min(boardH - y, L.h * boardH));

    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.width = w + 'px';
    p.style.height = h + 'px';
  });
}

async function resetLayout() {
  let newLayout = null;
  const filename = state.loadedFilename || getProjectFilename();
  let source = '기본';
  try {
    const res = await fetch('./' + filename, { cache: 'no-cache' });
    if (res.ok) {
      const d = await res.json();
      if (d.layout && Object.keys(d.layout).length) {
        newLayout = d.layout;
        source = `공용 배치 (${filename})`;
      }
    }
  } catch (e) { /* ignore — no server file */ }

  state.layout = newLayout || calcDefaultLayout();
  ensurePercentageLayout();
  applyLayout();
  // Charts need to re-measure for new panel sizes
  Object.values(charts).forEach(c => { try { c.resize(); } catch(e) {} });
  setTimeout(() => renderProcessChart(), 60);

  // Brief flash on the button to indicate which source was used
  const btn = document.getElementById('resetLayoutBtn');
  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ ' + source;
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  }
}
window.resetLayout = resetLayout;

/* ── Panel 2: 7-day daily chart ── */
function renderDailyChart() {
  const body = document.getElementById('p2-body');
  if (!body) return;
  body.innerHTML = `
    <div class="chart-legend">
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-asm)"></div>조립</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-glz)"></div>글레이징</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-pkg)"></div>포장</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-ship)"></div>출하</div>
    </div>
    <div class="chart-wrap"><canvas id="dailyCanvas"></canvas></div>`;

  const ref = state.refDate;
  const days = Array.from({length:7}, (_,i)=>addDays(ref, -6+i));
  const dsMap = { 조립:days.map(()=>0), 글레이징:days.map(()=>0), 포장:days.map(()=>0), 출하:days.map(()=>0) };
  getFilteredRows().forEach(r => {
    const map = {
      '조립': parseDate(r['조립완료시간']),
      '글레이징': parseDate(getGlzVal(r)),
      '포장': parseDate(r['포장완료시간']),
      '출하': shipDateOf(r),
    };
    Object.entries(map).forEach(([k,d]) => {
      if (!d) return;
      const i = days.findIndex(dd => toDS(dd) === toDS(d));
      if (i>=0) dsMap[k][i]++;
    });
  });
  const labels = days.map(d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`);

  if (charts.daily) charts.daily.destroy();
  charts.daily = new Chart(document.getElementById('dailyCanvas'), {
    type: 'bar',
    data: { labels, datasets: [
      { label:'조립',    data: dsMap.조립,    backgroundColor: state.stageColors['조립'],    stage:'조립' },
      { label:'글레이징', data: dsMap.글레이징, backgroundColor: state.stageColors['글레이징'], stage:'글레이징' },
      { label:'포장',    data: dsMap.포장,    backgroundColor: state.stageColors['포장'],    stage:'포장' },
      { label:'출하',    data: dsMap.출하,    backgroundColor: state.stageColors['출하'],    stage:'출하' },
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (e, items) => {
        if (!items.length) return;
        const it = items[0];
        const stage = charts.daily.data.datasets[it.datasetIndex].stage;
        const dayD = days[it.index];
        showDayStageDrilldown(stage, dayD);
      },
      onHover: (e, items) => { e.native.target.style.cursor = items.length ? 'pointer' : 'default'; },
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{display:false}, ticks:{color:'rgba(240,244,255,0.5)',font:{size:10}} },
        y: { grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(240,244,255,0.45)',font:{size:10}}, beginAtZero:true }
      }
    }
  });
}

/* ── Panel 5: 4-week chart ── */
function renderWeeklyChart() {
  const body = document.getElementById('p5-body');
  if (!body) return;
  body.innerHTML = `
    <div class="chart-legend">
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-asm)"></div>조립</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-glz)"></div>글레이징</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-pkg)"></div>포장</div>
      <div class="leg-item"><div class="leg-swatch" style="background:var(--c-ship)"></div>출하</div>
    </div>
    <div class="chart-wrap"><canvas id="weeklyCanvas"></canvas></div>`;

  const weeks = Array.from({length:5}, (_,i)=>startOfWeek(addDays(state.refDate, -4*7+i*7)));
  const wm = {};
  weeks.forEach(w => { const ds = toDS(w); wm[ds] = { label:`${w.getMonth()+1}/${w.getDate()}(주)`, 조립:0, 글레이징:0, 포장:0, 출하:0 }; });
  getFilteredRows().forEach(r => {
    const map = {
      '조립': parseDate(r['조립완료시간']),
      '글레이징': parseDate(getGlzVal(r)),
      '포장': parseDate(r['포장완료시간']),
      '출하': shipDateOf(r),
    };
    Object.entries(map).forEach(([k,d]) => {
      if (!d) return;
      const ws = toDS(startOfWeek(d));
      if (wm[ws]) wm[ws][k]++;
    });
  });
  const vals = Object.values(wm);
  if (charts.weekly) charts.weekly.destroy();
  charts.weekly = new Chart(document.getElementById('weeklyCanvas'), {
    type: 'bar',
    data: { labels: vals.map(v=>v.label), datasets: [
      { label:'조립',    data: vals.map(v=>v.조립),    backgroundColor: state.stageColors['조립'] },
      { label:'글레이징', data: vals.map(v=>v.글레이징), backgroundColor: state.stageColors['글레이징'] },
      { label:'포장',    data: vals.map(v=>v.포장),    backgroundColor: state.stageColors['포장'] },
      { label:'출하',    data: vals.map(v=>v.출하),    backgroundColor: state.stageColors['출하'] },
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid:{display:false}, ticks:{color:'rgba(240,244,255,0.5)',font:{size:10}} },
        y: { grid:{color:'rgba(255,255,255,0.05)'}, ticks:{color:'rgba(240,244,255,0.45)',font:{size:10}}, beginAtZero:true }
      }
    }
  });
}

/* ── Panel 7: Floor table ── */
function getFloorMap() {
  const all = [];
  for (let f = state.floorStart; f <= state.floorEnd; f++) all.push(f);
  const fm = {};
  all.forEach(f => { fm[f] = { 조립:0, 글레이징:0, 포장:0, 출하:0, 설치:0, total:0, rows: [] }; });
  getFilteredRows().forEach(r => {
    const fn = normFloor(r['층'] || r['층수']);
    if (fn === null || !fm[fn]) return;
    fm[fn].total++;
    fm[fn].rows.push(r);
    const st = (r['상태']||'').trim();
    ['조립','글레이징','포장','출하','설치'].forEach(s => {
      if (isCompletedBy(s, st, r, state.refDate)) fm[fn][s]++;
    });
  });
  return { floors: all, fm };
}

function renderFloorTable() {
  const body = document.getElementById('p7-body');
  if (!body) return;
  body.innerHTML = `<div class="floor-scroll"><table class="floor-tbl" id="floorTbl"></table></div>`;
  const { floors, fm } = getFloorMap();
  const stages = ['조립','글레이징','포장','출하','설치'];
  const stageColors = state.stageColors;
  const hdrs = floors.map(f => `<th>${f}층</th>`).join('');
  const rowsHTML = stages.map(s => {
    const cells = floors.map(f => {
      const v = fm[f][s]||0;
      return v > 0
        ? `<td class="has-val" onclick="showFloorStageDrilldown(${f},'${s}')">${v}</td>`
        : `<td></td>`;
    }).join('');
    return `<tr><td class="row-lbl color-pick" style="color:${stageColors[s]};border-left:3px solid ${stageColors[s]};" onclick="openColorPicker('${s}')" title="클릭하여 ${s} 색상 변경">${s}<span class="color-ico">●</span></td>${cells}</tr>`;
  }).join('');
  const planCells = floors.map(f => {
    const v = fm[f].total||0;
    return v > 0
      ? `<td class="has-val" onclick="showFloorPlanDrilldown(${f})">${v}</td>`
      : `<td></td>`;
  }).join('');
  document.getElementById('floorTbl').innerHTML =
    `<thead><tr><th class="sticky-col">구분</th>${hdrs}</tr></thead>
     <tbody>${rowsHTML}<tr class="plan"><td class="row-lbl">계획</td>${planCells}</tr></tbody>`;
}

function openModal(title, contentHTML) {

  document.getElementById('modalBody').innerHTML = contentHTML;

const PARTNO_KEYS = ['품번','부재번호','품목번호','자재번호','부재명','ID','part_no','partNo'];
function pickPartNoCol(rows) {
  for (const k of PARTNO_KEYS) {
    if (rows.some(r => r[k] != null && r[k] !== '')) return k;
  }
  return null;
}

function hexToRgba(hex, alpha) {
  const m = String(hex||'').match(/^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
  if (!m) return `rgba(26,223,139,${alpha})`;
  return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${alpha})`;
}

function renderRowsTable(rows, opts = {}) {
  if (!rows.length) return `<div class="modal-empty">표시할 데이터가 없습니다.</div>`;
  const partNoCol = pickPartNoCol(rows);
  const glzCol = GLZ_KEYS.find(k => rows.some(r => r[k] != null)) || '글래이징완료시간';
  const defaultCols = [partNoCol, '상태', '조립완료시간', glzCol, '포장완료시간', '출하일'].filter(Boolean);
  const cols = opts.cols || defaultCols;

  // Map clicked stage → which column to highlight
  const stageToCol = {
    '조립': '조립완료시간',
    '글레이징': glzCol,
    '포장': '포장완료시간',
    '출하': '출하일',
    '설치': '설치완료시간',
  };
  const hlCol   = opts.highlight ? stageToCol[opts.highlight] : null;
  const hlColor = opts.highlight ? (state.stageColors[opts.highlight] || '#1adf8b') : null;
  const styleAttr = hlColor
    ? ` style="--hl-c:${hlColor}; --hl-bg:${hexToRgba(hlColor,0.22)}; --hl-bg-l:${hexToRgba(hlColor,0.08)}"`
    : '';

  return `<table class="modal-table"${styleAttr}>
    <thead><tr>${cols.map(c => `<th class="${c === hlCol ? 'hl' : ''}">${escapeHTML(c)}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r => `<tr>${cols.map(c => {
      const cls = c === hlCol ? 'hl' : '';
      const v = r[c];
      if (v == null || v === '') return `<td class="${cls}">—</td>`;
      if (v instanceof Date) return `<td class="${cls}">${toDS(v)}</td>`;
      return `<td class="${cls}">${escapeHTML(String(v))}</td>`;
    }).join('')}</tr>`).join('')}</tbody></table>
    <div style="margin-top:10px; font-size:0.6875rem; color:var(--text-dim);">
      총 ${rows.length}건${opts.highlight ? ` · <span style="color:${hlColor};font-weight:600">${escapeHTML(opts.highlight)}</span> 기준` : ''}
    </div>`;
}

function showDayStageDrilldown(stage, dayD) {

/* ════════════════════════════════════════════
   SNAP TO ALIGNMENT (edges + centers of neighbor panels)
   ════════════════════════════════════════════ */
const SNAP_THRESHOLD = 10;     // pixels — within this distance, snap to neighbor's edge/center
const HEADER_H = 54;           // for converting board-internal y → screen y

function getSnapTargets(excludeId) {
  const boardW = window.innerWidth;
  const boardH = window.innerHeight - 54;
  const xs = [], ys = [];
  // Edges of all other panels (converted from percentage to pixels)
  Object.keys(state.layout).forEach(id => {
    if (id === excludeId) return;
    const L = state.layout[id];
    if (!L) return;
    const pxX = L.x * boardW;
    const pxY = L.y * boardH;
    const pxW = L.w * boardW;
    const pxH = L.h * boardH;
    xs.push(pxX, pxX + pxW, pxX + pxW / 2);
    ys.push(pxY, pxY + pxH, pxY + pxH / 2);
  });
  // Also: board edges (left=0, right=window width, top=0, bottom=board height)
  xs.push(0, boardW);
  ys.push(0, boardH);
  return { xs, ys };
}

function nearestSnap(val, candidates) {
  let best = null, bestD = SNAP_THRESHOLD;
  for (const c of candidates) {
    const d = Math.abs(val - c);
    if (d < bestD) { bestD = d; best = c; }
  }
  return best;
}

function ensureSnapGuide(orientation) {
  const id = orientation === 'v' ? 'snapGuideV' : 'snapGuideH';
  let g = document.getElementById(id);
  if (!g) {
    g = document.createElement('div');
    g.id = id;
    g.className = 'snap-guide';
    document.body.appendChild(g);
  }
  return g;
}
function showVGuide(boardX) {
  const g = ensureSnapGuide('v');
  g.style.left = boardX + 'px';
  g.style.top = HEADER_H + 'px';
  g.style.width = '1px';
  g.style.height = (window.innerHeight - HEADER_H) + 'px';
  g.classList.add('show');
}
function showHGuide(boardY) {
  const g = ensureSnapGuide('h');
  g.style.top = (boardY + HEADER_H) + 'px';
  g.style.left = '0';
  g.style.width = window.innerWidth + 'px';
  g.style.height = '1px';
  g.classList.add('show');
}
function hideGuides() {
  document.querySelectorAll('.snap-guide').forEach(g => g.classList.remove('show'));
}


function attachInteractions() {
  document.querySelectorAll('.panel-header').forEach(h => {
    h.addEventListener('mousedown', e => {
      // Don't start drag while a title is being edited
      if (e.target.classList && e.target.classList.contains('editing')) return;
      if (e.target.closest('.panel-actions')) return;
      startDrag(e, h.dataset.panel);
    });
  });
  document.querySelectorAll('.rs-handle').forEach(h => {
    h.addEventListener('mousedown', e => startResize(e, h.dataset.panel, h.dataset.dir, h));
  });
  // Double-click panel title to edit in place
  document.querySelectorAll('.panel-title').forEach(t => {
    t.title = '더블클릭하여 제목 수정';
    t.addEventListener('dblclick', function(e) {
      e.stopPropagation();
      this.contentEditable = 'true';
      this.classList.add('editing');
      this.focus();
      const range = document.createRange();
      range.selectNodeContents(this);
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
    });
    t.addEventListener('blur', function() {
      this.contentEditable = 'false';
      this.classList.remove('editing');
      const id = this.id.replace('-title', '');
      const def = PANEL_DEFS.find(p => p.id === id);
      const newTitle = this.textContent.trim();
      if (def && newTitle) def.title = newTitle;
      else if (def) this.textContent = def.title;
    });
    t.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
      if (e.key === 'Escape') {
        const id = this.id.replace('-title', '');
        const def = PANEL_DEFS.find(p => p.id === id);
        if (def) this.textContent = def.title;
        this.blur();
      }
    });
  });
}

function startDrag(e, id) {
  e.preventDefault();
  const panel = document.getElementById(id);
  const boardW = window.innerWidth;
  const boardH = window.innerHeight - 54;
  
  // Convert current percentage layout to pixels for dragging calculations
  const L0 = {
    x: state.layout[id].x * boardW,
    y: state.layout[id].y * boardH,
    w: state.layout[id].w * boardW,
    h: state.layout[id].h * boardH
  };
  
  const startX = e.clientX, startY = e.clientY;
  panel.classList.add('dragging');
  document.body.classList.add('is-dragging');
  let hoverTarget = null;

  function onMove(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    let nx = L0.x + dx, ny = L0.y + dy;
    nx = Math.max(0, Math.min(boardW - L0.w, nx));
    ny = Math.max(0, Math.min(boardH - 40, ny));

    // ── Snap to neighbor edges/centers ──
    const T = getSnapTargets(id);
    const cx = nx + L0.w / 2;
    const cy = ny + L0.h / 2;
    // X: try left edge, right edge, center (in priority order)
    const sxL = nearestSnap(nx, T.xs);
    const sxR = nearestSnap(nx + L0.w, T.xs);
    const sxC = nearestSnap(cx, T.xs);
    let xGuide = null;
    if (sxL !== null && (sxR === null || Math.abs(sxL - nx) <= Math.abs(sxR - (nx + L0.w)))
                     && (sxC === null || Math.abs(sxL - nx) <= Math.abs(sxC - cx))) { nx = sxL; xGuide = sxL; }
    else if (sxR !== null && (sxC === null || Math.abs(sxR - (nx + L0.w)) <= Math.abs(sxC - cx))) { nx = sxR - L0.w; xGuide = sxR; }
    else if (sxC !== null) { nx = sxC - L0.w/2; xGuide = sxC; }
    // Y: same logic
    const syT = nearestSnap(ny, T.ys);
    const syB = nearestSnap(ny + L0.h, T.ys);
    const syC = nearestSnap(cy, T.ys);
    let yGuide = null;
    if (syT !== null && (syB === null || Math.abs(syT - ny) <= Math.abs(syB - (ny + L0.h)))
                     && (syC === null || Math.abs(syT - ny) <= Math.abs(syC - cy))) { ny = syT; yGuide = syT; }
    else if (syB !== null && (syC === null || Math.abs(syB - (ny + L0.h)) <= Math.abs(syC - cy))) { ny = syB - L0.h; yGuide = syB; }
    else if (syC !== null) { ny = syC - L0.h/2; yGuide = syC; }

    if (xGuide !== null) showVGuide(xGuide); else hideGuides.call(null) || (document.getElementById('snapGuideV')?.classList.remove('show'));
    if (yGuide !== null) showHGuide(yGuide); else document.getElementById('snapGuideH')?.classList.remove('show');

    panel.style.left = nx + 'px';
    panel.style.top = ny + 'px';

    // detect swap target
    panel.style.pointerEvents = 'none';
    const elUnder = document.elementFromPoint(ev.clientX, ev.clientY);
    panel.style.pointerEvents = '';
    const tgt = elUnder?.closest('.panel');
    if (hoverTarget && hoverTarget !== tgt) { hoverTarget.classList.remove('swap-target'); hoverTarget = null; }
    if (tgt && tgt !== panel && tgt !== hoverTarget) { tgt.classList.add('swap-target'); hoverTarget = tgt; }
  }
  function onUp(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    panel.classList.remove('dragging');
    document.body.classList.remove('is-dragging');
    hideGuides();
    if (hoverTarget) {
      hoverTarget.classList.remove('swap-target');
      // swap positions
      const otherId = hoverTarget.id;
      const tmp = state.layout[id];
      state.layout[id] = state.layout[otherId];
      state.layout[otherId] = tmp;
    } else {
      // commit move (convert final pixels to percentages)
      state.layout[id] = {
        x: (parseFloat(panel.style.left) || 0) / boardW,
        y: (parseFloat(panel.style.top) || 0) / boardH,
        w: L0.w / boardW,
        h: L0.h / boardH,
      };
    }
    applyLayout();
    resizeCharts(true);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startResize(e, id, dir, handle) {
  e.preventDefault(); e.stopPropagation();
  const panel = document.getElementById(id);
  const boardW = window.innerWidth;
  const boardH = window.innerHeight - 54;
  
  // Convert current percentage layout to pixels for resizing calculations
  const L0 = {
    x: state.layout[id].x * boardW,
    y: state.layout[id].y * boardH,
    w: state.layout[id].w * boardW,
    h: state.layout[id].h * boardH
  };
  
  const startX = e.clientX, startY = e.clientY;
  panel.classList.add('resizing');
  handle.classList.add('active');
  document.body.classList.add('is-resizing');

  function onMove(ev) {
    const dx = ev.clientX - startX, dy = ev.clientY - startY;
    let nx = L0.x, ny = L0.y, nw = L0.w, nh = L0.h;
    if (dir.includes('e')) nw = L0.w + dx;
    if (dir.includes('w')) { nw = L0.w - dx; nx = L0.x + dx; }
    if (dir.includes('s')) nh = L0.h + dy;
    if (dir.includes('n')) { nh = L0.h - dy; ny = L0.y + dy; }
    if (nw < 140) { if (dir.includes('w')) nx = L0.x + L0.w - 140; nw = 140; }
    if (nh < 90)  { if (dir.includes('n')) ny = L0.y + L0.h - 90;  nh = 90;  }
    nx = Math.max(0, Math.min(boardW - nw, nx));
    ny = Math.max(0, Math.min(boardH - nh, ny));

    // ── Snap edges being dragged to neighbor lines ──
    const T = getSnapTargets(id);
    let xGuide = null, yGuide = null;
    if (dir.includes('e')) {
      const s = nearestSnap(nx + nw, T.xs);
      if (s !== null && s > nx + 140) { nw = s - nx; xGuide = s; }
    }
    if (dir.includes('w')) {
      const s = nearestSnap(nx, T.xs);
      if (s !== null && s < nx + nw - 140) { nw = nw + (nx - s); nx = s; xGuide = s; }
    }
    if (dir.includes('s')) {
      const s = nearestSnap(ny + nh, T.ys);
      if (s !== null && s > ny + 90) { nh = s - ny; yGuide = s; }
    }
    if (dir.includes('n')) {
      const s = nearestSnap(ny, T.ys);
      if (s !== null && s < ny + nh - 90) { nh = nh + (ny - s); ny = s; yGuide = s; }
    }
    if (xGuide !== null) showVGuide(xGuide); else document.getElementById('snapGuideV')?.classList.remove('show');
    if (yGuide !== null) showHGuide(yGuide); else document.getElementById('snapGuideH')?.classList.remove('show');

    panel.style.left = nx + 'px'; panel.style.top = ny + 'px';
    panel.style.width = nw + 'px'; panel.style.height = nh + 'px';
    resizeCharts(false);
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    panel.classList.remove('resizing');
    handle.classList.remove('active');
    document.body.classList.remove('is-resizing');
    hideGuides();
    
    // commit resize (convert final pixels to percentages)
    state.layout[id] = {
      x: (parseFloat(panel.style.left) || 0) / boardW,
      y: (parseFloat(panel.style.top) || 0) / boardH,
      w: (parseFloat(panel.style.width) || 140) / boardW,
      h: (parseFloat(panel.style.height) || 90) / boardH,
    };
    resizeCharts(true);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function resizeCharts(full) {
  Object.values(charts).forEach(c => { try { c.resize(); } catch(e) {} });

}

document.getElementById('xlsxInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      state.rows = XLSX.utils.sheet_to_json(ws, {raw:false, dateNF:'yyyy-mm-dd hh:mm:ss'});
      renderAll();
      // 업로드 후 즉시 현장 데이터로 서버 저장
      await saveSettingsToServer('site');
    } catch(err) { alert('파일을 읽을 수 없습니다: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
});

function openSettings() {
  state.tempCommonRows = null;
  const sXlsx = document.getElementById('sXlsxPathDisplay');
  if (sXlsx) sXlsx.textContent = "공통 데이터 파일이 선택되지 않았습니다";

  document.getElementById('sProjectName').value = state.projectName;
  document.getElementById('sLogoPathDisplay').textContent = state.logoSrc ? "기존 로고가 설정되어 있습니다" : "로고 이미지가 없습니다";
  document.getElementById('sOrderNo').value = state.orderNo || '';
  document.getElementById('sTotalQty').value = state.totalQty;
  document.getElementById('sFloorStart').value = state.floorStart;
  document.getElementById('sFloorEnd').value = state.floorEnd;
  document.getElementById('sNotes').value = state.notes.join('\n');

  // 현재 프로젝트 번호 (URL ?project= 파라미터 기반 데이터 파일) 표시
  const params = new URLSearchParams(window.location.search);
  const projectNo = params.get('project') || '';
  const safeProjectNo = projectNo.replace(/[^a-zA-Z0-9_-]/g, '');
  const projectNoEl = document.getElementById('sProjectNoValue');
  if (projectNoEl) {
    projectNoEl.textContent = safeProjectNo ? `data_${safeProjectNo}.json` : 'data.json (프로젝트 번호 없음)';
  }

  document.getElementById('sServerPassword').value = localStorage.getItem('dashboard_password') || '';

  document.getElementById('settingsModal').classList.add('open');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
function checkProjectNoExists(projectNo, rows) {
  if (!rows || !rows.length) return false;
  const target = String(projectNo).trim();
  if (!target) return false;
  for (const r of rows) {
    for (const key of ORDER_NO_KEYS) {
      if (r[key] !== undefined && r[key] !== null) {
        if (String(r[key]).trim() === target) {
          return true;
        }
      }
    }
  }
  return false;
}

async function applySettings() {
  const btn = document.getElementById('settingsSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const name = document.getElementById('sProjectName').value.trim();
    const orderNo = document.getElementById('sOrderNo').value.trim();
    const qty = parseInt(document.getElementById('sTotalQty').value) || state.totalQty;
    const fs = parseInt(document.getElementById('sFloorStart').value);
    const fe = parseInt(document.getElementById('sFloorEnd').value);
    const notes = document.getElementById('sNotes').value.split('\n').map(s=>s.trim()).filter(Boolean);

    // 프로젝트 번호가 입력된 경우, 데이터 내 존재 여부 확인
    if (orderNo) {
      const rowsToCheck = state.tempCommonRows || state.rows;
      const exists = checkProjectNoExists(orderNo, rowsToCheck);
      if (!exists) {
        alert("프로젝트가 없습니다");
        if (btn) {
          btn.disabled = false;
          btn.textContent = '💾 저장하기';
          btn.style.background = '';
        }
        return;
      }
    }

    if (name) state.projectName = name;
    state.orderNo = orderNo;
    state.totalQty = qty;
    if (!isNaN(fs) && fs > 0) state.floorStart = fs;
    if (!isNaN(fe) && fe > 0) state.floorEnd = fe;
    if (state.floorEnd < state.floorStart) { const t = state.floorStart; state.floorStart = state.floorEnd; state.floorEnd = t; }
    state.notes = notes.length ? notes : state.notes;

    // 공통 데이터 로드 적용
    const hasNewExcel = !!state.tempCommonRows;
    if (hasNewExcel) {
      state.rows = state.tempCommonRows;
      state.tempCommonRows = null;
    }

    const pwdVal = document.getElementById('sServerPassword').value.trim();
    if (pwdVal) localStorage.setItem('dashboard_password', pwdVal);

    renderAll();

    // 설정 저장: 엑셀 데이터 파일 업로드 유무에 따라 분기 저장
    let ok = false;
    if (hasNewExcel) {
      // 1. 공통 파일(data_common.json)에는 엑셀 데이터(rows)만 정제하여 저장 (이때 이력은 '종합'으로 변경)
      await saveSettingsToServer('common', orderNo);
      state.loadedFilename = '종합';
      // 2. 프로젝트 전용 파일(data_[프로젝트번호].json)에는 설정값을 포함한 모든 내용 저장 (viewMode: '종합'으로 저장)
      ok = await saveSettingsToServer('project', orderNo);
    } else {
      // 엑셀 업로드가 없는 일반 설정 저장은 항상 프로젝트 전용 파일로만 저장 (기존에 띄워져있던 이력 모드 그대로 저장)
      ok = await saveSettingsToServer('project', orderNo);
    }

    if (btn) {
      if (ok) {
        btn.textContent = '✓ 저장 완료';
        btn.style.background = '#15803d';
        setTimeout(() => {
          closeSettings();
          btn.disabled = false;
          btn.textContent = '💾 저장하기';
          btn.style.background = '';

          // 저장 성공 후 입력한 프로젝트 번호로 페이지 전환
          if (orderNo) {
            const params = new URLSearchParams(window.location.search);
            const currentProject = params.get('project') || '';
            const isAdmin = params.get('admin') === '1';
            if (currentProject !== orderNo) {
              window.location.search = `?project=${encodeURIComponent(orderNo)}${isAdmin ? '&admin=1' : ''}`;
            }
          }
        }, 1200);
      } else {
        btn.textContent = '💾 저장하기';
        btn.disabled = false;
        btn.style.background = '';
      }
    } else {
      closeSettings();
    }
  } catch (err) {
    console.error("applySettings error:", err);
    alert("저장 중 오류가 발생했습니다: " + err.message);
    if (btn) {
      btn.disabled = false;
      btn.textContent = '💾 저장하기';
      btn.style.background = '';
    }
  }
}

// 설정을 data_[project].json 또는 data_common.json 파일에 직접 저장 (X-Dashboard-Mode: main)
async function saveSettingsToServer(targetMode = null, customOrderNo = null) {
  const params = new URLSearchParams(window.location.search);
  const project = params.get('project') || '';
  const safeProject = project.replace(/[^a-zA-Z0-9_-]/g, '');

  let saveProject = safeProject;
  let labelMode = '현장';

  if (targetMode === 'project' || targetMode === 'site') {
    saveProject = (customOrderNo || safeProject).replace(/[^a-zA-Z0-9_-]/g, '');
    labelMode = '현장';
  } else if (targetMode === 'common') {
    saveProject = 'common';
    labelMode = '종합';
  } else {
    // targetMode가 지정되지 않은 경우, 현재 로드된 파일 모드를 보고 알아서 판단
    if (state.loadedFilename === '종합') {
      saveProject = 'common';
      labelMode = '종합';
    } else {
      saveProject = (customOrderNo || safeProject).replace(/[^a-zA-Z0-9_-]/g, '');
      labelMode = '현장';
    }
  }

  // data_common.json 파일에는 오직 엑셀 데이터(rows, tempHumidRows 등)만 저장하도록 페이로드 분리
  let payload;
  if (saveProject === 'common') {
    payload = {
      schema: 'production-dashboard.v1',
      savedAt: new Date().toISOString(),
      rows: state.rows,
      tempHumidRows: state.tempHumidRows
    };
  } else {
    payload = {
      schema: 'production-dashboard.v1',
      savedAt: new Date().toISOString(),
      viewMode: state.loadedFilename || '현장', // 현재 화면 이력 모드(현장/종합)를 함께 저장
      projectName: state.projectName,
      orderNo: state.orderNo,
      logoSrc: state.logoSrc,
      totalQty: state.totalQty,
      floorStart: state.floorStart,
      floorEnd: state.floorEnd,
      notes: state.notes,
      stageColors: state.stageColors,
      refDate: toDS(state.refDate),
      panelTitles: PANEL_DEFS.map(p => ({ id: p.id, title: p.title })),
      layout: state.layout,
      rows: state.rows,
      tempHumidRows: state.tempHumidRows,
    };
  }

  const json = JSON.stringify(payload, null, 2);
  const pwd = localStorage.getItem('dashboard_password') || '1234';

  try {
    const res = await fetch('./save_data.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Dashboard-Password': pwd,
        'X-Dashboard-Project': saveProject,
        'X-Dashboard-Mode': 'main'
      },
      body: json
    });
    const contentType = res.headers.get('content-type');
    if (contentType && contentType.includes('application/json')) {
      const resData = await res.json();
      if (res.ok && resData.success) {
        state.loadedFilename = (saveProject === 'common') ? '종합' : payload.viewMode;
        syncHistorySelectValue();
        showToast(`✓ ${state.loadedFilename} 설정 및 데이터가 저장되었습니다.`);
        console.log(`[settings] 서버 저장 완료 (${labelMode}):`, resData.filename);
        return true;
      } else {
        showToast('⚠ 서버 저장 실패: ' + (resData.message || '알 수 없는 오류'));
        console.warn('[settings] 서버 저장 실패:', resData);
        return false;
      }
    }
    showToast('⚠ 서버 응답 오류 (PHP 모듈 확인 필요)');
    return false;
  } catch(e) {
    showToast(`⚠ 서버 연결 실패 — ${labelMode} 데이터가 저장되지 않았습니다.`);
    console.warn('[settings] 서버 저장 오류:', e);
    return false;
  }
}

function getUniqueOrderNos() {
  const orderNos = new Set();
  state.rows.forEach(r => {
    for (const key of ORDER_NO_KEYS) {
      if (r[key] !== undefined && r[key] !== null) {
        const val = String(r[key]).trim();
        if (val) orderNos.add(val);
      }
    }
  });
  return Array.from(orderNos).sort();
}

}

/* ════════════════════════════════════════════
   DEMO DATA
   ════════════════════════════════════════════ */
function generateDemo() {
  const floors = [3,4,5,6,7];
  const statuses = [
    ...Array(127).fill('출하완료'),
    ...Array(71).fill('포장완료'),
    ...Array(100).fill('글래이징완료'),
    ...Array(91).fill('조립완료'),
    ...Array(36).fill('조립중')
  ];
  const today = new Date(); today.setHours(0,0,0,0);
  const rows = [];
  const itemsPerFloor = Math.ceil(statuses.length / floors.length);
  statuses.forEach((st, i) => {
    const f = floors[Math.min(floors.length-1, Math.floor(i / itemsPerFloor))];
    const base = new Date(today); base.setDate(today.getDate() - Math.floor(Math.random()*60+3));
    const aDay = new Date(base); aDay.setDate(base.getDate() + Math.floor(Math.random()*2));
    const gDay = new Date(aDay); gDay.setDate(aDay.getDate() + Math.floor(Math.random()*3+1));
    const pDay = new Date(gDay); pDay.setDate(gDay.getDate() + Math.floor(Math.random()*3+1));
    const sDay = new Date(pDay); sDay.setDate(pDay.getDate() + Math.floor(Math.random()*7+1));
    rows.push({
      '품번': `CW-${f}F-${String(i+1).padStart(4,'0')}`,
      '층': f + 'F',
      '상태': st,
      '조립완료시간': st !== '조립중' ? toDS(aDay) : null,
      '글래이징완료시간': ['포장완료','출하완료','글래이징완료'].includes(st) ? toDS(gDay) : null,
      '포장완료시간': ['포장완료','출하완료'].includes(st) ? toDS(pDay) : null,
      '출하일': st === '출하완료' ? toDS(sDay) : null,
    });
  });
  return rows;
}

/* ════════════════════════════════════════════
   INIT
   ════════════════════════════════════════════ */
(async function init() {
  // Admin gate: show 💾 서버 저장 + ↻ 배치 buttons + enable logo click only when URL has ?admin=1
  const admin = isAdminMode();
  if (admin) {
    const saveBtn = document.getElementById('serverSaveBtn');
    if (saveBtn) saveBtn.style.display = '';
    const resetBtn = document.getElementById('resetLayoutBtn');
    if (resetBtn) resetBtn.style.display = '';
    const settingsBtn = document.getElementById('settingsBtn');
    if (settingsBtn) settingsBtn.style.display = '';
  }

  // 서버 data_[project].json 로드 (설정 포함)
  const loaded = await loadServerData();
  if (!loaded) {
    state.rows = generateDemo();
  }

  // (기준일 오늘 날짜 강제 설정은 loadServerData 내부에서 처리됨)

  if (!state.layout || !Object.keys(state.layout).length) {
    state.layout = calcDefaultLayout();
  }
  applyStageColors();
  buildBoard();
  applyLayout();
  renderAll();
})();
