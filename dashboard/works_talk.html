<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시스템 알림 & 메신저</title>
<style>
  :root {
    --teal: #17777d;
    --teal-deep: #0e5a60;
    --teal-soft: #e0f0ef;
    --text-pri: #12343a;
    --text-sec: #5f8286;
    --text-dim: #9db9bb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: transparent;
    color: var(--text-pri);
    font-size: 14px;
    overflow: hidden;
  }
  #wrap { height: 100%; display: flex; flex-direction: column; padding: 4px 2px; }
  #listScroll { flex: 1; min-height: 0; overflow-y: auto; }
  #listScroll::-webkit-scrollbar { width: 6px; }
  #listScroll::-webkit-scrollbar-thumb { background: rgba(23,119,125,0.2); border-radius: 3px; }

  .works-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .works-list li {
    padding: 10px 12px; background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(23, 119, 125, 0.08); border-radius: 10px;
    font-size: 0.78rem; cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .works-list li:hover { background: var(--teal-soft); transform: translateY(-1px); }
  .list-placeholder {
    text-align: center; color: var(--text-dim);
    border: 1px dashed rgba(0, 0, 0, 0.06) !important; background: transparent !important;
    padding: 26px !important; cursor: default !important;
  }
  .list-placeholder:hover { transform: none !important; }

  .sns-item { display: flex; flex-direction: column; gap: 4px; width: 100%; text-align: left; min-width: 0; }
  .sns-meta { display: flex; justify-content: space-between; font-size: 0.68rem; }
  .sns-type { font-weight: 800; color: var(--teal); }
  .sns-type.error { color: #ef4444; }
  .sns-date { color: var(--text-dim); }
  .sns-content {
    color: var(--text-pri); line-height: 1.45;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  .works-unconfigured {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px 18px; height: 100%; min-height: 150px; color: var(--text-sec);
  }
  .unconfigured-icon { font-size: 2rem; margin-bottom: 10px; animation: plugPulse 2s infinite ease-in-out; }
  @keyframes plugPulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.08); opacity: 1; }
  }
  .unconfigured-title { font-size: 0.86rem; font-weight: 800; color: var(--text-pri); margin-bottom: 6px; }
  .unconfigured-desc { font-size: 0.72rem; line-height: 1.55; margin-bottom: 12px; max-width: 320px; }
  .unconfigured-link {
    font-size: 0.72rem; font-weight: 700; color: var(--teal); text-decoration: none;
    padding: 7px 14px; border: 1px solid rgba(23, 119, 125, 0.3); border-radius: 999px;
    background: #fff; font-family: inherit; cursor: pointer;
  }
  .unconfigured-link:hover { background: var(--teal-soft); }

  /* 상세보기 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0; z-index: 50;
    background: rgba(18, 52, 58, 0.35); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; padding: 14px;
  }
  .modal-bg.show { display: flex; }
  .modal-card {
    background: #fff; border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 92%; display: flex; flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25); padding: 16px;
  }
  .modal-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .modal-hd h3 { font-size: 0.88rem; font-weight: 800; color: var(--text-pri); line-height: 1.4; word-break: break-word; }
  .modal-close { background: none; border: none; cursor: pointer; color: var(--text-sec); font-size: 0.9rem; padding: 2px 4px; flex-shrink: 0; }
  .detail-meta { font-size: 0.7rem; color: var(--text-sec); margin-bottom: 10px; line-height: 1.5; }
  .detail-body {
    font-size: 0.78rem; color: var(--text-pri); line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
    flex: 1; min-height: 0; overflow-y: auto;
    background: #f7fafa; border: 1px solid rgba(23, 119, 125, 0.08);
    border-radius: 10px; padding: 12px;
  }
  .detail-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .btn-ghost {
    padding: 8px 16px; border-radius: 999px; font-size: 0.74rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    border: 1px solid #d6e2e2; background: #fff; color: var(--text-sec);
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="listScroll">
      <ul class="works-list" id="snsList">
        <li class="list-placeholder">알림 내역을 불러오는 중입니다...</li>
      </ul>
    </div>
  </div>

  <!-- 상세보기 모달 -->
  <div id="detailModal" class="modal-bg" onclick="if(event.target===this)closeDetail()">
    <div class="modal-card">
      <div class="modal-hd">
        <h3 id="detailTitle">상세 보기</h3>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-body" id="detailBody"></div>
      <div class="detail-actions">
        <button class="btn-ghost" onclick="closeDetail()">닫기</button>
      </div>
    </div>
  </div>

<script>
  // ══════════ 시스템 알림 & 메신저 모듈 (iframe 임베드용 독립 위젯) ══════════
  // 네이버웍스 API는 메신저 대화 목록 조회를 제공하지 않으므로,
  // 이 모듈은 서버(NAS) 시스템 경보·알림 피드를 표시합니다. (로그인 불필요)
  const API = 'naver_works_api.php';
  let notifications = [];

  function esc(s) { return String(s || '').replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t)); }

  async function fetchData() {
    try {
      const res = await fetch(API + '?action=notifications', { cache: 'no-cache' });
      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'API error');
      renderNotifications(data.notifications || []);
    } catch (err) {
      showUnconfigured();
    }
  }

  function showUnconfigured() {
    document.getElementById('listScroll').innerHTML = `
      <div class="works-unconfigured">
        <div class="unconfigured-icon">💬</div>
        <div class="unconfigured-title">알림 연동 대기 중</div>
        <div class="unconfigured-desc">양생실 경보 및 실적 저장 알림을 표시하려면 서버(NAS) 연동 설정이 필요합니다.</div>
        <a href="https://talk.worksmobile.com/" target="_blank" rel="noopener" class="unconfigured-link">네이버웍스 메신저 열기 ↗</a>
      </div>`;
  }

  function renderNotifications(list) {
    document.getElementById('listScroll').innerHTML = '<ul class="works-list" id="snsList"></ul>';
    const snsList = document.getElementById('snsList');
    if (list.length > 0) {
      notifications = list;
      snsList.innerHTML = list.map((n, idx) => `
        <li onclick="openDetail(${idx})">
          <div class="sns-item">
            <div class="sns-meta">
              <span class="sns-type ${n.level === 'error' ? 'error' : ''}">${esc(n.source)}</span>
              <span class="sns-date">${esc(n.time)}</span>
            </div>
            <div class="sns-content">${esc(n.message)}</div>
          </div>
        </li>`).join('');
    } else {
      snsList.innerHTML = '<li class="list-placeholder">시스템 경보 및 알림 내역이 없습니다.</li>';
    }
  }

  function openDetail(idx) {
    const n = notifications[idx]; if (!n) return;
    document.getElementById('detailTitle').textContent = n.source || '시스템 알림';
    document.getElementById('detailMeta').textContent = n.time || '';
    document.getElementById('detailBody').textContent = n.message || '';
    document.getElementById('detailModal').classList.add('show');
  }
  function closeDetail() { document.getElementById('detailModal').classList.remove('show'); }

  fetchData();
  setInterval(fetchData, 60 * 1000); // 경보는 1분 주기 갱신
</script>
</body>
</html>
