<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중앙알텍 사내 포털</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── 기본 ── */
  body {
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f1923 0%, #1a2a3a 40%, #243447 100%);
    color: #e4e8ec;
    overflow: hidden;
  }

  /* ── 배경 장식 ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(0,176,80,.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(30,120,200,.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── 카드 ── */
  .login-card {
    position: relative;
    width: 100%;
    max-width: 420px;
    margin: 20px;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 20px;
    padding: 48px 40px 40px;
    text-align: center;
    box-shadow: 0 32px 64px rgba(0,0,0,.35);
  }

  /* ── 로고 영역 ── */
  .logo-area {
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 64px; height: 64px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, #00b050, #00894a);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 8px 24px rgba(0,176,80,.3);
  }
  .company-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .company-name span {
    color: #00b050;
  }
  .portal-label {
    font-size: 13px;
    color: rgba(255,255,255,.45);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── 안내 문구 ── */
  .login-desc {
    font-size: 14px;
    color: rgba(255,255,255,.55);
    line-height: 1.6;
    margin-bottom: 32px;
    padding: 0 8px;
  }

  /* ── 로그인 버튼 ── */
  .login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 15px 24px;
    background: #00b050;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    box-shadow: 0 4px 16px rgba(0,176,80,.3);
    text-decoration: none;
  }
  .login-btn:hover {
    background: #00c95a;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,176,80,.4);
  }
  .login-btn:active {
    transform: translateY(0);
  }
  .login-btn svg {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }

  /* ── 구분선 ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: rgba(255,255,255,.25);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.1);
  }

  /* ── 보안 안내 ── */
  .security-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,.3);
  }
  .security-note svg {
    width: 14px; height: 14px;
    opacity: .5;
  }

  /* ── 하단 ── */
  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,.06);
    font-size: 11px;
    color: rgba(255,255,255,.2);
  }

  /* ── 로딩 상태 ── */
  .login-btn.loading {
    pointer-events: none;
    opacity: .7;
  }
  .spinner {
    display: none;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  .loading .spinner { display: block; }
  .loading .btn-icon { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 에러 메시지 ── */
  .error-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(220,53,69,.12);
    border: 1px solid rgba(220,53,69,.25);
    border-radius: 10px;
    font-size: 13px;
    color: #f77;
    text-align: left;
  }
  .error-msg.show { display: block; }

  /* ── 이미 로그인 됨 ── */
  .already-logged {
    display: none;
    text-align: center;
  }
  .already-logged .user-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00b050, #00894a);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 22px; font-weight: 700; color: #fff;
  }
  .already-logged .user-name {
    font-size: 18px; font-weight: 600; color: #fff;
  }
  .already-logged .user-email {
    font-size: 13px; color: rgba(255,255,255,.45); margin-top: 4px;
  }
  .enter-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
    padding: 12px 32px;
    background: #00b050;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }
  .enter-btn:hover { background: #00c95a; }
  .logout-link {
    display: block;
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,.35);
    cursor: pointer;
    background: none; border: none;
  }
  .logout-link:hover { color: rgba(255,255,255,.6); }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; }
    .company-name { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="login-card">
  <!-- ── 로고 ── -->
  <div class="logo-area">
    <div class="logo-icon">JA</div>
    <div class="company-name">㈜<span>중앙알텍</span></div>
    <div class="portal-label">사내 포털</div>
  </div>

  <!-- ── 로그인 전 화면 ── -->
  <div id="loginView">
    <p class="login-desc">
      사내 포털 이용을 위해<br>LINE WORKS 계정으로 로그인해 주세요.
    </p>

    <button class="login-btn" id="loginBtn" onclick="startLogin()">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 5.81 2 10.5c0 2.71 1.64 5.09 4.12 6.59-.18.63-.66 2.29-.76 2.64-.12.44.16.43.34.31.14-.09 2.2-1.5 3.1-2.1.72.11 1.46.16 2.2.16 5.52 0 10-3.81 10-8.5S17.52 2 12 2z"/>
      </svg>
      <div class="spinner"></div>
      LINE WORKS로 로그인
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="divider">회사 계정 전용</div>

    <div class="security-note">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 11h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11V12z"/>
      </svg>
      LINE WORKS 인증으로 안전하게 접속합니다
    </div>
  </div>

  <!-- ── 로그인 후 화면 ── -->
  <div class="already-logged" id="loggedView">
    <div class="user-avatar" id="userInitial">?</div>
    <div class="user-name" id="userName">-</div>
    <div class="user-email" id="userEmail">-</div>
    <a class="enter-btn" id="enterBtn">
      포털 입장 →
    </a>
    <button class="logout-link" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="footer">
    © 2026 ㈜중앙알텍 · IT 관련 문의: 관리팀
  </div>
</div>

<script src="auth-config.js"></script>
<script>
/**
 * ============================================================
 *  LINE WORKS OAuth 2.0 인증 흐름
 * ============================================================
 */

// ── 페이지 로드 시 세션 확인 ──
window.addEventListener('DOMContentLoaded', () => {
  // 콜백에서 돌아온 경우 (URL에 code 파라미터)
  const params = new URLSearchParams(location.search);
  const code  = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) {
    showError('로그인이 취소되었거나 오류가 발생했습니다: ' + (params.get('error_description') || error));
    return;
  }

  if (code && state) {
    // state 검증
    const savedState = sessionStorage.getItem('lw_oauth_state');
    if (state !== savedState) {
      showError('보안 검증에 실패했습니다. 다시 시도해 주세요.');
      return;
    }
    handleCallback(code);
    return;
  }

  // 기존 세션 확인
  checkSession();
});


// ── 로그인 시작 ──
function startLogin() {
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');

  // CSRF 방지용 state 생성
  const state = generateState();
  sessionStorage.setItem('lw_oauth_state', state);

  // LINE WORKS 인증 페이지로 이동
  const authUrl = AUTH_CONFIG.AUTH_URL
    + '?client_id='     + encodeURIComponent(AUTH_CONFIG.CLIENT_ID)
    + '&redirect_uri='  + encodeURIComponent(AUTH_CONFIG.REDIRECT_URI)
    + '&scope='         + encodeURIComponent(AUTH_CONFIG.SCOPE)
    + '&response_type=code'
    + '&state='         + encodeURIComponent(state);

  window.location.href = authUrl;
}


// ── 콜백 처리 (인증 코드 → 토큰 교환) ──
async function handleCallback(code) {
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');

  try {
    // ──────────────────────────────────────────────
    //  방법 A: 서버 프록시를 통한 토큰 교환 (권장)
    //  - token-proxy.php 또는 token-proxy.py 사용
    //  - Client Secret 이 브라우저에 노출되지 않음
    // ──────────────────────────────────────────────
    let tokenData;

    // 서버 프록시가 있으면 사용
    const proxyAvailable = await checkProxyAvailable();

    if (proxyAvailable) {
      const res = await fetch('token-proxy.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'code=' + encodeURIComponent(code)
      });
      tokenData = await res.json();

    } else {
      // ──────────────────────────────────────────
      //  방법 B: 클라이언트 직접 교환 (내부망 전용)
      //  ⚠ Client Secret 이 브라우저에 노출됨
      //  ⚠ 반드시 사내망에서만 사용하세요
      // ──────────────────────────────────────────
      const res = await fetch(AUTH_CONFIG.TOKEN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          client_id:     AUTH_CONFIG.CLIENT_ID,
          client_secret: AUTH_CONFIG.CLIENT_SECRET,
          code:          code,
          redirect_uri:  AUTH_CONFIG.REDIRECT_URI,
        })
      });
      tokenData = await res.json();
    }

    if (tokenData.error) {
      throw new Error(tokenData.error_description || tokenData.error);
    }

    // ── 사용자 프로필 ──
    // token-proxy.php가 서버측에서 함께 조회해 준 profile을 우선 사용
    // (브라우저에서 worksapis.com 직접 호출은 CORS 정책으로 차단됨)
    let profile = tokenData.profile || {};
    if (!tokenData.profile) {
      try {
        const profileRes = await fetch(AUTH_CONFIG.PROFILE_URL, {
          headers: { 'Authorization': 'Bearer ' + tokenData.access_token }
        });
        profile = await profileRes.json();
      } catch (e) {
        profile = {}; // 프로필 실패해도 로그인 자체는 진행
      }
    }

    // ── 세션 저장 ──
    const session = {
      accessToken: tokenData.access_token,
      userName:    profile.userName || profile.name || '사용자',
      email:       profile.email || '',
      userId:      profile.userId || '',
      loginAt:     Date.now(),
      expiresAt:   Date.now() + AUTH_CONFIG.SESSION_TTL,
    };
    sessionStorage.setItem('lw_session', JSON.stringify(session));

    // ── 메일 위젯(works_mail.html)과 토큰 공유 ──
    // 포털 로그인 scope에 mail.read가 포함되어 있으므로
    // 같은 토큰으로 메일 API 호출이 가능합니다.
    localStorage.setItem('naver_works_access_token', tokenData.access_token);
    if (tokenData.refresh_token) {
      localStorage.setItem('naver_works_refresh_token', tokenData.refresh_token);
    }
    const expiresIn = tokenData.expires_in || 28800; // 기본 8시간
    localStorage.setItem('naver_works_token_expires', String(Date.now() + expiresIn * 1000));

    // URL 정리 (code, state 파라미터 제거)
    history.replaceState(null, '', location.pathname);

    // 로그인 완료 화면 표시
    showLoggedIn(session);

  } catch (err) {
    console.error('Token exchange failed:', err);
    showError('인증 처리 중 오류가 발생했습니다: ' + err.message);
    btn.classList.remove('loading');
  }
}


// ── 세션 확인 ──
function checkSession() {
  const raw = sessionStorage.getItem('lw_session');
  if (!raw) return;

  try {
    const session = JSON.parse(raw);
    if (Date.now() > session.expiresAt) {
      sessionStorage.removeItem('lw_session');
      return;
    }
    showLoggedIn(session);
  } catch {
    sessionStorage.removeItem('lw_session');
  }
}


// ── 로그인 완료 UI ──
function showLoggedIn(session) {
  document.getElementById('loginView').style.display = 'none';
  const loggedView = document.getElementById('loggedView');
  loggedView.style.display = 'block';

  const initial = (session.userName || '?').charAt(0).toUpperCase();
  document.getElementById('userInitial').textContent = initial;
  document.getElementById('userName').textContent = session.userName;
  document.getElementById('userEmail').textContent = session.email || session.userId;
  document.getElementById('enterBtn').href = AUTH_CONFIG.MAIN_PAGE;

  // 로그인 성공 시 자동으로 포털로 이동
  window.location.href = AUTH_CONFIG.MAIN_PAGE;
}


// ── 로그아웃 ──
function doLogout() {
  sessionStorage.removeItem('lw_session');
  sessionStorage.removeItem('lw_oauth_state');
  // 메일 위젯 공유 토큰도 함께 정리
  localStorage.removeItem('naver_works_access_token');
  localStorage.removeItem('naver_works_refresh_token');
  localStorage.removeItem('naver_works_token_expires');
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('loggedView').style.display = 'none';
}


// ── 에러 표시 ──
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}


// ── CSRF state 생성 ──
function generateState() {
  const arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr, b => b.toString(16).padStart(2, '0')).join('');
}


// ── 프록시 존재 확인 ──
async function checkProxyAvailable() {
  try {
    const res = await fetch('token-proxy.php', { method: 'HEAD' });
    return res.ok || res.status === 405;
  } catch {
    return false;
  }
}
</script>

</body>
</html>
